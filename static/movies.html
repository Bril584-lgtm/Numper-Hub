<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Numper Movies & TV</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #e50914;
    --accent-dim: rgba(229,9,20,.18);
    --radius: 10px;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 1rem;
    padding: .7rem 1.4rem;
  }
  .nav-logo { font-weight: 800; font-size: 1.15rem; color: var(--accent); text-decoration: none; flex-shrink: 0; }
  .nav-logo span { color: var(--text); }
  .search-wrap { position: relative; flex: 1; max-width: 420px; }
  #search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: .45rem 1rem .45rem 2.4rem; color: var(--text); font-size: .9rem; outline: none; transition: border-color .15s; }
  #search:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: .8rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: .9rem; }
  #suggestions { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; z-index: 200; display: none; }
  .sug-item { display: flex; align-items: center; gap: .7rem; padding: .5rem .8rem; cursor: pointer; transition: background .1s; font-size: .88rem; }
  .sug-item:hover { background: var(--surface2); }
  .sug-thumb { width: 32px; height: 46px; object-fit: cover; border-radius: 4px; background: #222; flex-shrink: 0; }
  .sug-info { display: flex; flex-direction: column; gap: .1rem; }
  .sug-title { font-weight: 600; }
  .sug-meta { color: var(--muted); font-size: .78rem; }
  .nav-back { color: var(--muted); font-size: .85rem; text-decoration: none; white-space: nowrap; }
  .nav-back:hover { color: var(--text); }

  /* ── HERO / TRENDING ── */
  #hero { position: relative; height: 72vh; min-height: 360px; max-height: 580px; overflow: hidden; }
  #hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center top; transition: opacity .6s; }
  #hero-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 0%, rgba(10,10,10,.5) 50%, rgba(10,10,10,.2) 100%); }
  #hero-content { position: absolute; bottom: 2.5rem; left: 2.5rem; right: 2.5rem; z-index: 2; max-width: 540px; }
  #hero-badge { display: inline-block; background: var(--accent); color: #fff; font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: .2rem .55rem; border-radius: 4px; margin-bottom: .6rem; }
  #hero-title { font-size: 2.4rem; font-weight: 800; line-height: 1.1; margin-bottom: .5rem; text-shadow: 0 2px 8px rgba(0,0,0,.8); }
  #hero-synopsis { color: #ccc; font-size: .9rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 1rem; text-shadow: 0 1px 4px rgba(0,0,0,.9); }
  .hero-actions { display: flex; gap: .7rem; }
  .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.3rem; border-radius: 6px; font-size: .9rem; font-weight: 600; border: none; cursor: pointer; transition: filter .15s, transform .1s; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: rgba(255,255,255,.18); color: #fff; backdrop-filter: blur(4px); }
  .btn:hover { filter: brightness(1.12); }
  .trending-dots { position: absolute; bottom: 1rem; right: 2rem; z-index: 2; display: flex; gap: .4rem; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.35); cursor: pointer; transition: background .2s, transform .2s; }
  .dot.active { background: var(--accent); transform: scale(1.3); }

  /* ── ROWS ── */
  #rows { padding: 1.5rem 1.4rem 4rem; }
  .row { margin-bottom: 2.2rem; }
  .row-label { font-size: 1rem; font-weight: 700; margin-bottom: .8rem; color: var(--text); }
  .row-scroll { display: flex; gap: .8rem; overflow-x: auto; padding-bottom: .5rem; scrollbar-width: none; }
  .row-scroll::-webkit-scrollbar { display: none; }
  .card { flex-shrink: 0; width: 130px; cursor: pointer; }
  .card-img { width: 130px; height: 190px; object-fit: cover; border-radius: var(--radius); background: var(--surface2); display: block; transition: transform .18s, box-shadow .18s; }
  .card:hover .card-img { transform: scale(1.04); box-shadow: 0 8px 24px rgba(0,0,0,.7); }
  .card-title { font-size: .78rem; font-weight: 600; margin-top: .4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: .72rem; color: var(--muted); margin-top: .15rem; }

  /* ── MODAL ── */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 300; align-items: center; justify-content: center; padding: 1rem; }
  #modal-overlay.open { display: flex; }
  #modal { background: var(--surface); border-radius: 14px; width: 100%; max-width: 880px; max-height: 90vh; overflow-y: auto; position: relative; border: 1px solid var(--border); }
  #modal-close { position: absolute; top: .8rem; right: .9rem; background: rgba(0,0,0,.6); border: none; color: #fff; font-size: 1.1rem; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
  #modal-banner { width: 100%; height: 240px; object-fit: cover; border-radius: 14px 14px 0 0; background: var(--surface2); display: block; }
  #modal-body { padding: 1.3rem 1.5rem 1.5rem; }
  #modal-meta { display: flex; gap: .8rem; align-items: center; flex-wrap: wrap; margin-bottom: .8rem; }
  #modal-title { font-size: 1.5rem; font-weight: 800; margin-bottom: .4rem; }
  .tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: .18rem .5rem; font-size: .75rem; color: var(--muted); }
  .tag.accent { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  #modal-synopsis { color: #ccc; font-size: .88rem; line-height: 1.6; margin-bottom: 1.2rem; }

  /* season/ep selector */
  #season-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: .4rem .7rem; color: var(--text); font-size: .88rem; cursor: pointer; margin-bottom: .8rem; outline: none; }
  #ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: .7rem; margin-bottom: 1.2rem; max-height: 320px; overflow-y: auto; }
  .ep-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color .15s, transform .12s; display: flex; align-items: center; gap: .6rem; padding: .5rem; }
  .ep-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .ep-thumb { width: 64px; height: 44px; object-fit: cover; border-radius: 5px; background: #222; flex-shrink: 0; }
  .ep-info { flex: 1; min-width: 0; }
  .ep-num { font-size: .75rem; color: var(--accent); font-weight: 700; }
  .ep-name { font-size: .8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* player */
  #player-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; display: none; margin-bottom: .8rem; }
  #player-wrap.open { display: block; }
  #player { width: 100%; height: 100%; border: none; }
  #player-loading { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; font-size: .9rem; color: var(--muted); }
  #source-bar { display: none; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: .5rem; }
  #source-bar.open { display: flex; }
  .src-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: .78rem; cursor: pointer; transition: all .15s; }
  .src-btn:hover { border-color: var(--accent); color: var(--accent); }
  .src-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── SPINNER / SKELETON ── */
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 3rem auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius); }
  @keyframes shimmer { to { background-position: -200% 0; } }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/"><span>Numper</span> Movies</a>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search" type="text" placeholder="Search movies & TV…" autocomplete="off">
    <div id="suggestions"></div>
  </div>
  <a class="nav-back" href="/">← Hub</a>
</nav>

<div id="hero">
  <div id="hero-bg"></div>
  <div id="hero-content">
    <div id="hero-badge">Trending</div>
    <div id="hero-title">Loading…</div>
    <div id="hero-synopsis"></div>
    <div class="hero-actions">
      <button class="btn btn-primary" id="hero-play">▶ Play</button>
      <button class="btn btn-secondary" id="hero-info">ⓘ More Info</button>
    </div>
  </div>
  <div class="trending-dots" id="dots"></div>
</div>

<div id="rows"></div>

<!-- modal -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close">✕</button>
    <img id="modal-banner" src="" alt="">
    <div id="modal-body">
      <div id="modal-title"></div>
      <div id="modal-meta"></div>
      <div id="modal-synopsis"></div>
      <select id="season-select" style="display:none"></select>
      <div id="ep-grid"></div>
      <div id="source-bar"></div>
      <div id="player-wrap"><iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe><div id="player-loading">Loading stream…</div></div>
      <button class="btn btn-primary" id="modal-play" style="display:none">▶ Play Movie</button>
    </div>
  </div>
</div>

<script>
const API = '';
let _trending = [], _heroIdx = 0, _heroTimer = null;
let _currentItem = null, _currentSeason = 1;

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadHome() {
  const res = await fetch(`${API}/api/movies/home`);
  const data = await res.json();
  _trending = data.trending || [];
  renderHero();
  renderRows(data.rows || []);
}

// ── Hero ──────────────────────────────────────────────────────────────────────
function renderHero() {
  if (!_trending.length) return;
  const item = _trending[_heroIdx];
  const bg = document.getElementById('hero-bg');
  bg.style.backgroundImage = `url('${item.banner || item.thumb}')`;
  document.getElementById('hero-title').textContent = item.title;
  document.getElementById('hero-synopsis').textContent = item.synopsis;
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  _trending.slice(0, 8).forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === _heroIdx ? ' active' : '');
    d.onclick = () => { _heroIdx = i; renderHero(); resetTimer(); };
    dots.appendChild(d);
  });
  clearInterval(_heroTimer);
  _heroTimer = setInterval(() => { _heroIdx = (_heroIdx + 1) % Math.min(_trending.length, 8); renderHero(); }, 6000);
}
function resetTimer() { clearInterval(_heroTimer); _heroTimer = setInterval(() => { _heroIdx = (_heroIdx + 1) % Math.min(_trending.length, 8); renderHero(); }, 6000); }
document.getElementById('hero-play').onclick = () => _trending[_heroIdx] && openItem(_trending[_heroIdx]);
document.getElementById('hero-info').onclick = () => _trending[_heroIdx] && openItem(_trending[_heroIdx]);

// ── Rows ──────────────────────────────────────────────────────────────────────
function renderRows(rows) {
  const container = document.getElementById('rows');
  container.innerHTML = '';
  rows.forEach(row => {
    if (!row.items.length) return;
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `<div class="row-label">${row.label}</div><div class="row-scroll"></div>`;
    const scroll = div.querySelector('.row-scroll');
    row.items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<img class="card-img skeleton" src="${item.thumb}" alt="" loading="lazy"><div class="card-title">${item.title}</div><div class="card-meta">${item.year} · ${item.type === 'tv' ? 'TV' : 'Movie'}</div>`;
      card.querySelector('img').onload = e => e.target.classList.remove('skeleton');
      card.onclick = () => openItem(item);
      scroll.appendChild(card);
    });
    container.appendChild(div);
  });
}

// ── Search ────────────────────────────────────────────────────────────────────
let _searchTimer = null;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(_searchTimer);
  const q = e.target.value.trim();
  if (!q) { hideSug(); return; }
  _searchTimer = setTimeout(() => fetchSug(q), 280);
});
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Escape') hideSug();
});
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) hideSug(); });

async function fetchSug(q) {
  const res = await fetch(`${API}/api/suggest?q=${encodeURIComponent(q)}`);
  const data = await res.json();
  const box = document.getElementById('suggestions');
  if (!data.results.length) { box.style.display = 'none'; return; }
  box.innerHTML = data.results.map((r, i) => `
    <div class="sug-item" data-i="${i}">
      <img class="sug-thumb" src="${r.thumb}" alt="" loading="lazy">
      <div class="sug-info"><div class="sug-title">${r.title}</div><div class="sug-meta">${r.year} · ${r.type === 'tv' ? 'TV' : 'Movie'}</div></div>
    </div>`).join('');
  box._results = data.results;
  box.querySelectorAll('.sug-item').forEach(el => {
    el.onclick = () => { hideSug(); document.getElementById('search').value = ''; openItem(box._results[+el.dataset.i]); };
  });
  box.style.display = 'block';
}
function hideSug() { document.getElementById('suggestions').style.display = 'none'; }

// ── Modal / Item open ─────────────────────────────────────────────────────────
async function openItem(item) {
  _currentItem = null;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-title').textContent = item.title;
  document.getElementById('modal-meta').innerHTML = '';
  document.getElementById('modal-synopsis').textContent = 'Loading…';
  document.getElementById('modal-banner').src = item.banner || item.thumb;
  document.getElementById('ep-grid').innerHTML = '';
  document.getElementById('player-wrap').classList.remove('open');
  document.getElementById('modal-play').style.display = 'none';
  document.getElementById('season-select').style.display = 'none';

  const res = await fetch(`${API}/api/details?id=${item.id}&type=${item.type}`);
  const d = await res.json();
  _currentItem = d;

  document.getElementById('modal-title').textContent = d.title;
  document.getElementById('modal-synopsis').textContent = d.synopsis;
  const meta = document.getElementById('modal-meta');
  const tags = [d.year, d.type === 'tv' ? 'TV Series' : 'Movie', d.score ? `${d.score}%` : null, ...(d.genres || [])].filter(Boolean);
  meta.innerHTML = tags.map((t, i) => `<span class="tag${i === 0 ? '' : ''}">${t}</span>`).join('');

  if (d.type === 'tv') {
    const sel = document.getElementById('season-select');
    sel.style.display = 'block';
    sel.innerHTML = (d.season_list || []).map(s => `<option value="${s.number}">${s.name} (${s.episodes} eps)</option>`).join('');
    _currentSeason = d.season_list?.[0]?.number || 1;
    sel.value = _currentSeason;
    sel.onchange = () => { _currentSeason = +sel.value; loadEpisodes(_currentItem.id, _currentSeason); };
    loadEpisodes(d.id, _currentSeason);
  } else {
    document.getElementById('modal-play').style.display = 'inline-flex';
  }
}

async function loadEpisodes(id, season) {
  const grid = document.getElementById('ep-grid');
  grid.innerHTML = '<div class="spinner"></div>';
  const res = await fetch(`${API}/api/season?id=${id}&season=${season}`);
  const data = await res.json();
  grid.innerHTML = '';
  (data.episodes || []).forEach(ep => {
    const card = document.createElement('div');
    card.className = 'ep-card';
    card.innerHTML = `<img class="ep-thumb" src="${ep.thumb || ''}" alt="" loading="lazy"><div class="ep-info"><div class="ep-num">E${ep.number}</div><div class="ep-name">${ep.name || `Episode ${ep.number}`}</div></div>`;
    card.onclick = () => playTV(_currentItem.id, season, ep.number);
    grid.appendChild(card);
  });
}

async function playTV(id, season, ep) {
  const res = await fetch(`${API}/api/stream/tv?id=${id}&season=${season}&ep=${ep}`);
  if (!res.ok) return;
  const data = await res.json();
  showPlayer(data.sources || [{ name: data.source, url: data.url }]);
  loadPlayer(data.url);
}

document.getElementById('modal-play').onclick = async () => {
  if (!_currentItem) return;
  const res = await fetch(`${API}/api/stream/movie?id=${_currentItem.id}`);
  if (!res.ok) return;
  const data = await res.json();
  showPlayer(data.sources || [{ name: data.source, url: data.url }]);
  loadPlayer(data.url);
};

function showPlayer(sources) {
  const wrap = document.getElementById('player-wrap');
  wrap.classList.add('open');
  document.getElementById('player-loading').style.display = 'flex';
  document.getElementById('player-loading').textContent = 'Loading…';
  document.getElementById('player').src = '';
  wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
  const bar = document.getElementById('source-bar');
  bar.innerHTML = '<span style="color:var(--muted);font-size:.78rem">Source:</span>';
  bar.classList.add('open');
  sources.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'src-btn' + (i === 0 ? ' active' : '');
    btn.textContent = s.name;
    btn.onclick = () => {
      bar.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadPlayer(s.url);
    };
    bar.appendChild(btn);
  });
}

function loadPlayer(url) {
  const frame = document.getElementById('player');
  const loading = document.getElementById('player-loading');
  loading.style.display = 'flex';
  loading.textContent = 'Loading…';
  frame.src = url;
  frame.onload = () => { loading.style.display = 'none'; };
}

// ── Modal close ───────────────────────────────────────────────────────────────
document.getElementById('modal-close').onclick = closeModal;
document.getElementById('modal-overlay').onclick = e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); };
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('player').src = '';
  document.getElementById('player-wrap').classList.remove('open');
  document.getElementById('source-bar').classList.remove('open');
  document.getElementById('source-bar').innerHTML = '';
}

loadHome();
</script>
</body>
</html>
